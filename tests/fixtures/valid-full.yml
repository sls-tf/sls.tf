service: full-test-service
frameworkVersion: '3'

provider:
  name: aws
  runtime: nodejs18.x
  region: us-west-2
  stage: dev
  memorySize: 512
  timeout: 10

functions:
  hello:
    handler: handler.hello
    runtime: python3.9
    memorySize: 1024
  world:
    handler: handler.world
    timeout: 30

custom:
  myCustomValue: test

resources:
  Resources:
    MyBucket:
      Type: AWS::S3::Bucket

package:
  individually: true
