service: multi-event-test

provider:
  name: aws
  runtime: nodejs18.x
  region: us-east-1
  stage: dev

functions:
  multiSchedule:
    handler: handler.process
    events:
      - schedule: rate(10 minutes)
      - schedule:
          rate: cron(0 * * * ? *)
          description: Hourly task
      - eventBridge:
          pattern:
            source:
              - aws.s3
