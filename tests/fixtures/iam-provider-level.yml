service: iam-provider-test

provider:
  name: aws
  runtime: nodejs18.x
  stage: dev
  region: us-east-1
  iamRoleStatements:
    - Effect: Allow
      Action:
        - dynamodb:PutItem
        - dynamodb:GetItem
      Resource: arn:aws:dynamodb:us-east-1:123456789012:table/MyTable
    - Effect: Allow
      Action: s3:GetObject
      Resource:
        - arn:aws:s3:::my-bucket/*
        - arn:aws:s3:::other-bucket/*

functions:
  hello:
    handler: handler.hello

  world:
    handler: handler.world
