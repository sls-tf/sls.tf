AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Simple SAM application with one function

Resources:
  HelloFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: src/index.handler
      Runtime: nodejs18.x
      MemorySize: 256
      Timeout: 10
      Description: Hello world handler
      Events:
        HelloApi:
          Type: Api
          Properties:
            Path: /hello
            Method: GET
