service: schedule-cron

provider:
  name: aws
  runtime: python3.11
  region: us-west-2
  stage: prod

functions:
  dailyReport:
    handler: report.generate
    events:
      - schedule:
          rate: cron(0 12 * * ? *)
          enabled: false
          description: Daily report generation at noon UTC
          input:
            key: value
