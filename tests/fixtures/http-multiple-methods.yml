service: test-service
provider:
  name: aws
  runtime: nodejs18.x
functions:
  getUsers:
    handler: users.get
    events:
      - http:
          path: /users
          method: GET
          cors: true
  createUser:
    handler: users.create
    events:
      - http:
          path: /users
          method: POST
          cors: true
