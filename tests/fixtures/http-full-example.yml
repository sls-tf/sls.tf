service: test-api-service
provider:
  name: aws
  runtime: nodejs18.x
  stage: dev
  region: us-east-1
  memorySize: 512
  timeout: 10
functions:
  getUsers:
    handler: users.list
    events:
      - http:
          path: /users
          method: GET
          cors: true
  getUser:
    handler: users.get
    events:
      - http: GET /users/{id}
  createUser:
    handler: users.create
    events:
      - http:
          path: /users
          method: POST
          cors:
            origin: https://example.com
            headers:
              - Content-Type
              - Authorization
  updateUser:
    handler: users.update
    events:
      - http:
          path: /users/{id}
          method: PUT
          cors: true
  getUserPosts:
    handler: posts.list
    events:
      - http: GET /users/{userId}/posts
