service: user-service
frameworkVersion: '3'
configValidationMode: error
provider:
  name: aws
  runtime: nodejs22.x
  region: us-east-1
  stage: dev
  timeout: 30
  memorySize: 256
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:BatchGetItem
            - dynamodb:BatchWriteItem
          Resource:
            - arn:aws:dynamodb:*:*:table/users
            - arn:aws:dynamodb:*:*:table/user-sessions
        - Effect: Allow
          Action:
            - events:PutEvents
            - events:PutRule
            - events:DeleteRule
            - events:ListTargetsByRule
            - events:PutTargets
            - events:RemoveTargets
          Resource: '*'
        - Effect: Allow
          Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
          Resource: arn:aws:logs:*:*:*
  environment: {}
  apiGateway:
    minimumCompressionSize: 1024
    restApiId:
      Fn::ImportValue: user-service-api-id
    restApiRootResourceId:
      Fn::ImportValue: user-service-api-root-id
functions:
  api-ingest:
    description: Ingests API requests and publishes events
    handler: handler.processApiRequest
    runtime: nodejs22.x
    timeout: 15
    memorySize: 512
    environment:
      LOG_LEVEL: INFO
      TABLE_NAME: users
    events:
      - http:
          path: /{proxy+}
          method: any
          cors: true
    deadLetterArn:
      Fn::GetAtt:
        - Api-ingestDLQ
        - Arn
  user-created-processor:
    description: Processes user.created events
    handler: handler.processUserCreated
    runtime: nodejs22.x
    timeout: 30
    memorySize: 256
    environment:
      NOTIFICATION_TOPIC: user-notifications
    events:
      - eventBridge:
          pattern:
            source:
              - user.service
            detail-type:
              - user.created
      - eventBridge:
          pattern:
            source:
              - user.service
            detail-type:
              - user.deleted
      - stream:
          type: dynamodb
          arn:
            Fn::GetAtt:
              - DynamoDBUsersTable
              - StreamArn
          batchSize: 10
          maximumRetryAttempts: 2
          bisectBatchOnError: false
          maximumRecordAgeInSeconds: 60
    deadLetterArn:
      Fn::GetAtt:
        - User-created-processorDLQ
        - Arn
  user-updated-processor:
    description: Processes user.updated events
    handler: handler.processUserUpdated
    runtime: nodejs22.x
    timeout: 30
    memorySize: 256
    environment: {}
    events:
      - eventBridge:
          pattern:
            source:
              - user.service
            detail-type:
              - user.updated
      - stream:
          type: dynamodb
          arn:
            Fn::GetAtt:
              - DynamoDBUsersTable
              - StreamArn
          batchSize: 10
          maximumRetryAttempts: 2
          bisectBatchOnError: false
          maximumRecordAgeInSeconds: 60
    deadLetterArn:
      Fn::GetAtt:
        - User-updated-processorDLQ
        - Arn
  dlq-reprocessor:
    description: Reprocesses failed events from DLQ
    handler: handler.reprocessFromDLQ
    runtime: nodejs22.x
    timeout: 60
    memorySize: 512
    environment: {}
    events:
      - stream:
          type: dynamodb
          arn:
            Fn::GetAtt:
              - DynamoDBUsersTable
              - StreamArn
          batchSize: 10
          maximumRetryAttempts: 2
          bisectBatchOnError: false
          maximumRecordAgeInSeconds: 60
resources:
  Resources:
    DynamoDBUsersTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: users
        AttributeDefinitions:
          - AttributeName: userId
            AttributeType: S
          - AttributeName: createdAt
            AttributeType: 'N'
        KeySchema:
          - AttributeName: userId
            KeyType: HASH
          - AttributeName: createdAt
            KeyType: RANGE
        BillingMode: PAY_PER_REQUEST
        StreamSpecification:
          StreamViewType: NEW_AND_OLD_IMAGES
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true
        SSESpecification:
          SSEEnabled: true
        TimeToLiveSpecification:
          AttributeName: expiresAt
          Enabled: true
    DynamoDBUser-sessionsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: user-sessions
        AttributeDefinitions:
          - AttributeName: sessionId
            AttributeType: S
        KeySchema:
          - AttributeName: sessionId
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST
        SSESpecification:
          SSEEnabled: true
        TimeToLiveSpecification:
          AttributeName: expiresAt
          Enabled: true
    EventBridgeBus:
      Type: AWS::Events::EventBus
      Properties:
        Name: user-events
    user-created-processorUser-createdEventPermission:
      Type: AWS::Lambda::Permission
      Properties:
        FunctionName:
          Fn::GetAtt:
            - User-created-processor
            - Arn
        Action: lambda:InvokeFunction
        Principal: events.amazonaws.com
        SourceArn:
          Fn::GetAtt:
            - User-createdRule
            - Arn
    User-createdRule:
      Type: AWS::Events::Rule
      Properties:
        Name: user-created
        Description: Routes user.created events to processor
        EventPattern:
          source:
            - user.service
          detail-type:
            - user.created
        EventBusName: user-events
        State: ENABLED
        Targets:
          - Arn:
              Fn::GetAtt:
                - User-created-processor
                - Arn
            Id: user-created-processor-target
    user-updated-processorUser-updatedEventPermission:
      Type: AWS::Lambda::Permission
      Properties:
        FunctionName:
          Fn::GetAtt:
            - User-updated-processor
            - Arn
        Action: lambda:InvokeFunction
        Principal: events.amazonaws.com
        SourceArn:
          Fn::GetAtt:
            - User-updatedRule
            - Arn
    User-updatedRule:
      Type: AWS::Events::Rule
      Properties:
        Name: user-updated
        Description: Routes user.updated events to processor
        EventPattern:
          source:
            - user.service
          detail-type:
            - user.updated
        EventBusName: user-events
        State: ENABLED
        Targets:
          - Arn:
              Fn::GetAtt:
                - User-updated-processor
                - Arn
            Id: user-updated-processor-target
    user-created-processorUser-deletedEventPermission:
      Type: AWS::Lambda::Permission
      Properties:
        FunctionName:
          Fn::GetAtt:
            - User-created-processor
            - Arn
        Action: lambda:InvokeFunction
        Principal: events.amazonaws.com
        SourceArn:
          Fn::GetAtt:
            - User-deletedRule
            - Arn
    User-deletedRule:
      Type: AWS::Events::Rule
      Properties:
        Name: user-deleted
        Description: Routes user.deleted events to multiple processors
        EventPattern:
          source:
            - user.service
          detail-type:
            - user.deleted
        EventBusName: user-events
        State: ENABLED
        Targets:
          - Arn:
              Fn::GetAtt:
                - User-created-processor
                - Arn
            Id: user-created-processor-target
custom:
  originalElementalConfig:
    service:
      name: user-service
      description: User management event-driven microservice
    defaults:
      lambda:
        runtime: nodejs22.x
        timeout: 30
        memory_size: 256
      tags:
        Team: platform
        ManagedBy: terraform
        Service: user-service
    lambdas:
      api-ingest:
        description: Ingests API requests and publishes events
        handler: handler.processApiRequest
        source_dir: ./lambda/api-ingest
        timeout: 15
        memory_size: 512
        environment:
          LOG_LEVEL: INFO
          TABLE_NAME: users
        dlq:
          enabled: true
      user-created-processor:
        description: Processes user.created events
        handler: handler.processUserCreated
        source_dir: ./lambda/user-created-processor
        environment:
          NOTIFICATION_TOPIC: user-notifications
        dlq:
          enabled: true
          name: user-created-dlq
      user-updated-processor:
        description: Processes user.updated events
        handler: handler.processUserUpdated
        source_dir: ./lambda/user-updated-processor
        dlq:
          enabled: true
      dlq-reprocessor:
        description: Reprocesses failed events from DLQ
        handler: handler.reprocessFromDLQ
        source_dir: ./lambda/dlq-reprocessor
        timeout: 60
        memory_size: 512
        dlq:
          enabled: false
    dynamodb_tables:
      users:
        table_name: users
        hash_key: userId
        range_key: createdAt
        attributes:
          - name: userId
            type: S
          - name: createdAt
            type: 'N'
        ttl_attribute: expiresAt
        billing_mode: PAY_PER_REQUEST
        pitr_enabled: true
        stream_view_type: NEW_AND_OLD_IMAGES
      user-sessions:
        table_name: user-sessions
        hash_key: sessionId
        attributes:
          - name: sessionId
            type: S
        ttl_attribute: expiresAt
        billing_mode: PAY_PER_REQUEST
        pitr_enabled: false
    api_gateway:
      enabled: true
      api_name: user-api
      stage_name: v1
    eventbridge:
      bus_name: user-events
      rules:
        user-created:
          description: Routes user.created events to processor
          event_pattern:
            source:
              - user.service
            detail-type:
              - user.created
          targets:
            - type: lambda
              lambda: user-created-processor
              dlq:
                enabled: true
        user-updated:
          description: Routes user.updated events to processor
          event_pattern:
            source:
              - user.service
            detail-type:
              - user.updated
          targets:
            - type: lambda
              lambda: user-updated-processor
              dlq:
                enabled: true
        user-deleted:
          description: Routes user.deleted events to multiple processors
          event_pattern:
            source:
              - user.service
            detail-type:
              - user.deleted
          targets:
            - type: lambda
              lambda: user-created-processor
              dlq:
                enabled: true
