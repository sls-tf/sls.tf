name: Module Tests

# This workflow tests the sls.tf module independently of the website
on:
  push:
    branches:
      - main
      - develop
    paths-ignore:
      - 'website/**'
      - 'infrastructure/website/**'
      - 'README-WEBSITE.md'
  pull_request:
    branches:
      - main
      - develop
    paths-ignore:
      - 'website/**'
      - 'infrastructure/website/**'
      - 'README-WEBSITE.md'
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  TERRAFORM_VERSION: '1.8'

jobs:
  # Terraform validation and formatting
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.changes.outputs.source }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Check for module changes
        id: changes
        run: |
          if [[ -n "$(git diff --name-only HEAD~1 HEAD | grep -v 'website/')" ]]; then
            echo "source=true" >> $GITHUB_OUTPUT
          else
            echo "source=false" >> $GITHUB_OUTPUT
          fi

  # Run Terraform tests
  test:
    name: Run Terraform Tests
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.has_changes == 'true'

    strategy:
      matrix:
        config-file:
          - 'tests/fixtures/valid-minimal.yml'
          - 'tests/fixtures/valid-full.yml'
          - 'tests/fixtures/cloudfront-distribution.yml'
          - 'tests/fixtures/cloudfront-s3.yml'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Cache Terraform
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d
          key: terraform-${{ hashFiles('**/*.tf') }}
          restore-keys: |
            terraform-

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="config_path=${{ matrix.config-file }}" \
            -var="lambda_code_path=tests/fixtures" \
            -out=tfplan

      - name: Show Plan Summary
        run: |
          echo "## Plan Summary for ${{ matrix.config-file }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          terraform show -json tfplan | jq -r '.planned_values.root_module.resources | length' | xargs echo "Resources planned:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # TypeScript tests
  test-typescript:
    name: Test TypeScript Configuration
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.has_changes == 'true'

    strategy:
      matrix:
        config-file:
          - 'tests/fixtures/valid-minimal.ts'
          - 'tests/fixtures/async-export.ts'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      - name: Install TypeScript dependencies
        run: |
          cd scripts
          npm ci

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Test TypeScript Configuration
        run: |
          terraform plan \
            -var="config_path=${{ matrix.config-file }}" \
            -var="config_format=typescript" \
            -var="lambda_code_path=tests/fixtures" \
            -out=tfplan

  # Conversion tool tests
  test-conversion:
    name: Test Conversion Tool
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.has_changes == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: scripts/package-lock.json

      - name: Install dependencies
        run: |
          cd scripts
          npm ci

      - name: Test Conversion Tool
        run: |
          node scripts/elemental-to-serverless-converter.js \
            ../infra/events/elemental-event-driven-service/examples/comprehensive-service.yaml \
            /tmp/converted-service.yml

      - name: Validate Converted Configuration
        run: |
          # Check if the converted file is valid YAML
          node -e "
            const yaml = require('js-yaml');
            const fs = require('fs');
            try {
              const config = yaml.load(fs.readFileSync('/tmp/converted-service.yml', 'utf8'));
              console.log('✅ Converted configuration is valid YAML');
              console.log('Service:', config.service);
              console.log('Functions:', Object.keys(config.functions || {}).length);
              console.log('Resources:', Object.keys(config.resources?.Resources || {}).length);
            } catch (error) {
              console.error('❌ Invalid YAML:', error.message);
              process.exit(1);
            }
          "

  # Security scan
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.has_changes == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # Documentation check
  docs-check:
    name: Check Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check README links
        run: |
          # Basic link check in README
          echo "Checking README.md for broken links..."
          if grep -q "http" README.md; then
            echo "✅ README.md contains HTTP links"
          else
            echo "❌ No HTTP links found in README.md"
            exit 1
          fi

      - name: Check Terraform documentation
        run: |
          # Check if all Terraform files have descriptions
          for file in *.tf; do
            if [ -f "$file" ]; then
              echo "Checking $file..."
              # Simple check for comments/descriptions
              comment_lines=$(grep -c "^#" "$file" || true)
              if [ "$comment_lines" -eq 0 ]; then
                echo "⚠️ Warning: $file has no comments"
              else
                echo "✅ $file has $comment_lines comment lines"
              fi
            fi
          done

  # Integration test
  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [validate, test]
    if: needs.validate.outputs.has_changes == 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Install TypeScript dependencies
        run: |
          cd scripts
          npm ci

      - name: Create test Lambda code
        run: |
          mkdir -p test-lambda/src
          cat > test-lambda/src/handler.js << 'EOF'
          exports.handler = async (event) => {
            return {
              statusCode: 200,
              body: JSON.stringify({ message: 'Hello from sls.tf!' })
            };
          };
          EOF

          cat > test-lambda/package.json << 'EOF'
          {
            "name": "test-lambda",
            "version": "1.0.0"
          }
          EOF

      - name: Create test configuration
        run: |
          cat > test-serverless.yml << 'EOF'
          service: integration-test
          frameworkVersion: '3'
          provider:
            name: aws
            runtime: nodejs18.x
            region: us-east-1
            stage: test
          functions:
            hello:
              handler: src/handler.handler
              events:
                - http:
                    path: /hello
                    method: get
                    cors: true
          EOF

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="config_path=test-serverless.yml" \
            -var="lambda_code_path=test-lambda" \
            -out=integration-test-plan

      - name: Validate Integration Test Plan
        run: |
          # Check if all expected resources are planned
          resources=$(terraform show -json integration-test-plan | jq -r '.planned_values.root_module.resources | length')
          if [ "$resources" -lt 5 ]; then
            echo "❌ Integration test failed: Expected at least 5 resources, got $resources"
            terraform show integration-test-plan
            exit 1
          else
            echo "✅ Integration test passed: $resources resources planned"
          fi

  # Notify on failure
  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [validate, test, test-typescript, test-conversion, security-scan, docs-check, integration-test]
    if: failure()

    steps:
      - name: Notify Slack on failure
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          channel: '#ci-cd'
          text: 'sls.tf module tests failed! Please check the GitHub Actions logs.'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

  # Create test summary
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [validate, test, test-typescript, test-conversion, security-scan, docs-check, integration-test]
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Test Summary
        run: |
          echo "# 🧪 sls.tf Module Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Validate | ${{ needs.validate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| TypeScript | ${{ needs.test-typescript.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Conversion | ${{ needs.test-conversion.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Documentation | ${{ needs.docs-check.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration | ${{ needs.integration-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.validate.result }}" == "success" &&
                "${{ needs.test.result }}" == "success" &&
                "${{ needs.test-typescript.result }}" == "success" &&
                "${{ needs.test-conversion.result }}" == "success" &&
                "${{ needs.security-scan.result }}" == "success" &&
                "${{ needs.docs-check.result }}" == "success" &&
                "${{ needs.integration-test.result }}" == "success" ]]; then
            echo "## ✅ All Tests Passed!" >> $GITHUB_STEP_SUMMARY
            echo "The sls.tf module is ready for deployment." >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Some Tests Failed" >> $GITHUB_STEP_SUMMARY
            echo "Please review the failed jobs above." >> $GITHUB_STEP_SUMMARY
          fi