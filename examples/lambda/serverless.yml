service: lambda-example

provider:
  name: aws
  runtime: nodejs20.x
  stage: dev
  region: us-east-1
  memorySize: 256
  timeout: 30

functions:
  hello:
    handler: index.handler
    description: Simple hello world function
    environment:
      GREETING: Hello

  goodbye:
    handler: goodbye.handler
    runtime: python3.12
    memorySize: 512
    timeout: 60
    description: Goodbye function with custom runtime and memory

  minimal:
    handler: minimal.handler
